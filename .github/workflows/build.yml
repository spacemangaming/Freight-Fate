name: Build

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip release creation'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      is_nightly: ${{ steps.check.outputs.is_nightly }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Check build conditions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tagged stable release trigger
            echo "is_nightly=false" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            # Manual dispatch trigger
            echo "is_nightly=true" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=dispatch-${VERSION}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

  build:
    name: ${{ matrix.label }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev --group build

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          BIG_RIG_HORIZON_NO_SPEECH: "1"
        run: uv run pytest -q

      - name: Build
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          BIG_RIG_HORIZON_NO_SPEECH: "1"
        run: >
          uv run python tools/build_release.py
          --tag "${{ needs.prepare.outputs.is_nightly == 'true' && needs.prepare.outputs.tag || needs.prepare.outputs.version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.label }}
          path: |
            dist/BigRigHorizon-*.zip
            dist/BigRigHorizon-*.tar.gz

  release:
    name: Release
    needs: [prepare, build]
    if: always() && needs.prepare.outputs.should_build == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: assets
          merge-multiple: true

      - name: Prepare release notes and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          (cd assets && sha256sum * > checksums.txt)

          if [ "$IS_NIGHTLY" = "true" ]; then
            python3 tools/release_notes.py nightly --output notes.md
          else
            python3 tools/release_notes.py stable \
              --version "$TAG" --output notes.md
          fi

      - name: Create release
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "$IS_NIGHTLY" = "true" ]; then
            gh release delete "$TAG" -y --cleanup-tag 2>/dev/null || true
            gh release create "$TAG" assets/* --notes-file notes.md \
              --title "Dispatch snapshot v${VERSION}" \
              --prerelease --target "${{ github.ref_name }}"
          else
            if gh release view "$TAG" &>/dev/null; then
              gh release upload "$TAG" assets/* --clobber
              gh release edit "$TAG" --notes-file notes.md --title "Big Rig Horizon v${VERSION}"
            else
              gh release create "$TAG" assets/* --notes-file notes.md \
                --title "Big Rig Horizon v${VERSION}"
            fi
          fi
